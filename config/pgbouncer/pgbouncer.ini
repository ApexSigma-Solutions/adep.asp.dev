;; ApexSigma Phase 2 - PostgreSQL Connection Pooling Configuration
;; PgBouncer configuration for database connection optimization

[databases]
* = host=apexsigma_postgres port=5432 user=apexsigma_user password=your_secure_postgres_password_here

[pgbouncer]
;; Pool settings
pool_mode = transaction
listen_port = 5432
listen_addr = *
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Connection limits
max_client_conn = 100
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
max_db_connections = 50
max_user_connections = 30

;; Pool timeout settings
server_reset_query = DISCARD ALL
server_check_query = select 1
server_check_delay = 30

;; Connection timeouts (in seconds)
server_connect_timeout = 15
server_login_retry = 15
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
server_idle_timeout = 600
server_lifetime = 3600
client_login_timeout = 60

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

;; Performance tuning
ignore_startup_parameters = extra_float_digits

;; Administrative settings
admin_users = apexsigma_user
stats_users = apexsigma_user

;; Process settings
pidfile = /var/run/pgbouncer/pgbouncer.pid
unix_socket_dir = /var/run/pgbouncer
