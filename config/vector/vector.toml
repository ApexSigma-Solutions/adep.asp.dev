# Minimal Vector Configuration for ApexSigma
# Docker logs source disabled on Windows - Docker socket not accessible
# Using internal metrics to keep Vector running

# Internal metrics source - continuously generates metrics
[sources.internal_metrics]
type = "internal_metrics"

# Console sink for metrics (discards data but keeps pipeline running)
[sinks.console]
type = "console"
inputs = ["internal_metrics"]
encoding.codec = "json"

# API endpoint for health checks
[api]
enabled = true
address = "0.0.0.0:8686"
playground = false
