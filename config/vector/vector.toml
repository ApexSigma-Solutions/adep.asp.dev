# Vector Configuration for ApexSigma Observability Pipeline
# Routes logs from multiple sources to ClickHouse

# ==================================================
# DATA SOURCES
# ==================================================

# Docker container logs
[sources.docker_logs]
type = "docker_logs"
include_containers = [
    "apexsigma_*"
]

# HTTP endpoint for receiving logs from services
[sources.http_logs]
type = "http_server"
address = "0.0.0.0:8686"
encoding = "json"
path = "/logs"

# Prometheus metrics (if remote write configured)
[sources.prometheus_remote_write]
type = "prometheus_remote_write"
address = "0.0.0.0:9090"

# File-based logs (fallback)
[sources.file_logs]
type = "file"
include = ["/var/log/apexsigma/*.log"]
encoding = "text"

# ==================================================
# DATA TRANSFORMATIONS
# ==================================================

# Parse and enrich docker logs
[transforms.docker_logs_processed]
type = "remap"
inputs = ["docker_logs"]
source = '''
  # Parse JSON logs if possible
  if is_string(.message) {
    parsed, err = parse_json(.message)
    if err == null {
      . = merge(., parsed)
    }
  }
  
  # Extract service name from container name
  .service = replace!(.container_name, "apexsigma_", "")
  .service = replace!(.service, "_", "-")
  
  # Standardize log level
  if exists(.level) {
    .level = upcase!(.level)
  } else if exists(.severity) {
    .level = upcase!(.severity)
  } else {
    .level = "INFO"
  }
  
  # Add metadata
  .source = "docker"
  .labels = {
    "container_name": .container_name,
    "service": .service,
    "environment": "docker-compose"
  }
  
  # Ensure timestamp is properly formatted
  if !exists(.timestamp) {
    .timestamp = now()
  }
'''

# Process HTTP logs
[transforms.http_logs_processed]
type = "remap"
inputs = ["http_logs"]
source = '''
  # Extract service information from HTTP headers or body
  if exists(.headers."x-service-name") {
    .service = .headers."x-service-name"
  } else if exists(.service) {
    .service = .service
  } else {
    .service = "unknown"
  }
  
  # Standardize fields
  .level = upcase!(string!(.level) ?? "INFO")
  .source = "http"
  .labels = object!(.labels) ?? {}
  
  if !exists(.timestamp) {
    .timestamp = now()
  }
'''

# Process Prometheus metrics
[transforms.prometheus_processed]
type = "remap"
inputs = ["prometheus_remote_write"]
source = '''
  # Convert Prometheus metrics to ClickHouse format
  .metric_name = .name
  .source = "prometheus"
  .labels = object!(.labels) ?? {}
  
  # Extract common labels
  if exists(.labels.job) {
    .job = .labels.job
  }
  if exists(.labels.instance) {
    .instance = .labels.instance
  }
'''

# ==================================================
# DATA ROUTING
# ==================================================

# Route different log types
[transforms.log_router]
type = "route"
inputs = ["docker_logs_processed", "http_logs_processed"]

# Route all logs to ClickHouse
[transforms.log_router.route.all_logs]
type = "vrl"
source = 'true'

# ==================================================
# DATA SINKS
# ==================================================

# ClickHouse sink for logs
[sinks.clickhouse_logs]
type = "clickhouse"
inputs = ["log_router.all_logs"]
endpoint = "http://clickhouse:8123"
database = "apexsigma_observability"
table = "logs"
auth = { strategy = "basic", user = "clickhouse_user", password = "change_me_securely" }

# Batch settings for performance
[sinks.clickhouse_logs.batch]
max_events = 1000
timeout_secs = 30

# Buffer settings
[sinks.clickhouse_logs.buffer]
max_events = 10000
when_full = "block"

# Encoding settings
[sinks.clickhouse_logs.encoding]
codec = "json"

# Field mapping for ClickHouse
[sinks.clickhouse_logs.encoding.except_fields]
fields = ["host", "source_type", "file", "container_id"]

# ClickHouse sink for Prometheus metrics
[sinks.clickhouse_metrics]
type = "clickhouse"
inputs = ["prometheus_processed"]
endpoint = "http://clickhouse:8123"
database = "apexsigma_observability"
table = "prometheus_metrics"
auth = { strategy = "basic", user = "clickhouse_user", password = "change_me_securely" }

[sinks.clickhouse_metrics.batch]
max_events = 5000
timeout_secs = 10

# Console output for debugging (can be disabled in production)
[sinks.debug_console]
type = "console"
inputs = ["log_router.all_logs"]
encoding = { codec = "json" }
target = "stdout"

# ==================================================
# HEALTH CHECK & ADMIN
# ==================================================

# API configuration for health checks
[api]
enabled = true
address = "0.0.0.0:8686"
playground = false

# Internal metrics
[sources.internal_metrics]
type = "internal_metrics"
namespace = "vector"

[sinks.internal_metrics_clickhouse]
type = "clickhouse"
inputs = ["internal_metrics"]
endpoint = "http://clickhouse:8123"
database = "apexsigma_observability"
table = "prometheus_metrics"
auth = { strategy = "basic", user = "clickhouse_user", password = "change_me_securely" }

# Transform internal metrics to match schema
[transforms.internal_metrics_processed]
type = "remap"
inputs = ["internal_metrics"]
source = '''
  .metric_name = .name
  .source = "vector_internal"
  .labels = object!(.labels) ?? {}
  .job = "vector"
  .instance = get_hostname!()
'''
