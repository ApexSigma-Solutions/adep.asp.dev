# Standard Python rules for ast-grep
# These are boilerplate patterns for linting Python code

[[rules]]
id = "unused-import"
message = "Unused import detected"
language = "python"
pattern = "import $NAME"
rewrite = ""

[[rules]]
id = "snake-case-variable"
message = "Variable names should use snake_case"
language = "python"
pattern = "$VAR = $VALUE"
constraints = {
  VAR = { regex = "^[A-Z]" }  # Flag if starts with uppercase
}

[[rules]]
id = "long-line"
message = "Line exceeds 80 characters"
language = "python"
pattern = "$LINE"
constraints = {
  LINE = { length = { gt = 80 } }
}

[[rules]]
id = "print-statement"
message = "Avoid using print in production code"
language = "python"
pattern = "print($ARGS)"
