services:
  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"

  memos-tests:
    build:
      context: ./services/memos.as
      dockerfile: Dockerfile
    container_name: apexsigma_memos_tests
    working_dir: /code
    depends_on:
      - neo4j
      - postgres
      - redis
      - qdrant
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "Apexsigma123_"
      DATABASE_URL: "postgresql://apexsigma_user:Apexsigma123_@postgres:5432/apexsigma_db"
    # Use the built image's installed dependencies; run migrations then tests
    command: /bin/sh -c "poetry run alembic -c alembic.ini upgrade head || true && poetry run pytest app/tests -q -m integration"

