name: apexsigma-devcontainer

services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: apexsigma_workspace
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    networks:
      - apexsigma_net
    environment:
      - PYTHONUNBUFFERED=1
      - POETRY_VIRTUALENVS_IN_PROJECT=true
      - POETRY_NO_INTERACTION=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/workspace
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGFUSE_HOST=https://cloud.langfuse.com
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - POSTGRES_HOST=apexsigma_postgres
      - REDIS_HOST=apexsigma_redis
      - RABBITMQ_HOST=apexsigma_rabbitmq
      - QDRANT_HOST=apexsigma_qdrant
      - NEO4J_HOST=apexsigma_neo4j
      - INGEST_LLM_HOST=172.26.0.12
      - MEMOS_HOST=172.26.0.13
      - CLICKHOUSE_HOST=apexsigma_clickhouse
      - VAULT_HOST=apexsigma_vault
    restart: unless-stopped

networks:
  apexsigma_net:
    external: true
