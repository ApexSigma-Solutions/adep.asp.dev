version: api/v1beta1
kind: config
metadata:
  name: keploy-devenviro-config
spec:
  path: "./devenviro-tests"
  command: "python -m uvicorn services.devenviro.as.app.main:app --host 0.0.0.0 --port 3001"
  network:
    filterNoise: true
    delay: 10
  test:
    path: "./devenviro-tests/tests"
    command: "python -m pytest devenviro-tests/ -v"
    delay: 5