version: "0.1"
# Minimal Trunk configuration for memos verification
tool:
  linters:
    djlint:
      enabled: true
      version: "1.34.1"

actions:
  run-tests:
    description: Run memos pytest suite and produce JUnit XML for Trunk uploads
    cmd: poetry run pytest --junit-xml=services/memos.as/reports/junit.xml -o junit_family=xunit1
