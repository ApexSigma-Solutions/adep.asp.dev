version: "0.1"

# Comprehensive Trunk configuration for ApexSigma ecosystem
cli:
  version: 1.22.0

# Linting and formatting tools
tool:
  linters:
    djlint:
      enabled: true
      version: 1.34.1
    ruff:
      enabled: true
      version: 0.6.0
    black:
      enabled: true
      version: 24.8.0
    isort:
      enabled: true
      version: 5.13.2
    mypy:
      enabled: true
      version: 1.11.0
    flake8:
      enabled: true
      version: 7.1.0

# Test actions for all services
actions:
  run-tests:
    description: Run all service test suites and produce JUnit XML for Trunk uploads
    cmd: |
      # Create reports directory
      mkdir -p reports

      # Run tests for each service
      echo "Running memos.as tests..."
      cd services/memos.as && poetry run pytest --junit-xml=../../reports/junit-memos.xml -o junit_family=xunit1 --tb=short -m "not e2e" || true
      cd ../..

      echo "Running devenviro.as tests..."
      cd services/devenviro.as && poetry run pytest --junit-xml=../../reports/junit-devenviro.xml -o junit_family=xunit1 --tb=short -m "not e2e" || true
      cd ../..

      echo "Running tools.as tests..."
      cd services/tools.as && poetry run pytest --junit-xml=../../reports/junit-tools.xml -o junit_family=xunit1 --tb=short -m "not e2e" || true
      cd ../..

      echo "Running InGest-LLM.as tests..."
      cd services/InGest-LLM.as && poetry run pytest --junit-xml=../../reports/junit-ingest.xml -o junit_family=xunit1 --tb=short -m "not e2e" || true
      cd ../..

      echo "Running libs tests..."
      poetry run pytest libs/ --junit-xml=reports/junit-libs.xml -o junit_family=xunit1 --tb=short || true

      echo "Running root level tests..."
      poetry run pytest tests/ --junit-xml=reports/junit-root.xml -o junit_family=xunit1 --tb=short -m "not e2e" || true

  run-memos-tests:
    description: Run memos.as pytest suite and produce JUnit XML for Trunk uploads
    cmd: |
      mkdir -p reports
      cd services/memos.as && poetry run pytest --junit-xml=../../reports/junit-memos.xml -o junit_family=xunit1 --tb=short -m "not e2e"

  run-devenviro-tests:
    description: Run devenviro.as pytest suite and produce JUnit XML for Trunk uploads
    cmd: |
      mkdir -p reports
      cd services/devenviro.as && poetry run pytest --junit-xml=../../reports/junit-devenviro.xml -o junit_family=xunit1 --tb=short -m "not e2e"

  run-tools-tests:
    description: Run tools.as pytest suite and produce JUnit XML for Trunk uploads
    cmd: |
      mkdir -p reports
      cd services/tools.as && poetry run pytest --junit-xml=../../reports/junit-tools.xml -o junit_family=xunit1 --tb=short -m "not e2e"

  run-ingest-tests:
    description: Run InGest-LLM.as pytest suite and produce JUnit XML for Trunk uploads
    cmd: |
      mkdir -p reports
      cd services/InGest-LLM.as && poetry run pytest --junit-xml=../../reports/junit-ingest.xml -o junit_family=xunit1 --tb=short -m "not e2e"

  run-libs-tests:
    description: Run shared libraries tests and produce JUnit XML for Trunk uploads
    cmd: |
      mkdir -p reports
      poetry run pytest libs/ --junit-xml=reports/junit-libs.xml -o junit_family=xunit1 --tb=short

  run-integration-tests:
    description: Run integration tests across all services
    cmd: |
      mkdir -p reports
      # Start services for integration testing
      docker compose -f docker-compose.ci.yml up -d
      sleep 30

      # Run integration tests
      poetry run pytest tests/ --junit-xml=reports/junit-integration.xml -o junit_family=xunit1 --tb=short -m "integration" || true

      # Cleanup
      docker compose -f docker-compose.ci.yml down

# Merge queue configuration
merge:
  # Require all tests to pass before merging
  required_status_checks:
    - test
    - keploy-test
    - monitoring

  # Block merging if any of these conditions are met
  block_merge:
    - required_status_checks_pending: true
    - conflicts_exist: true
    - required_reviews_missing: true

# Upload configuration for test results
upload:
  # Upload all JUnit XML files to Trunk
  junit_paths:
    - reports/junit-*.xml
    - "**/junit.xml"

  # Organization settings
  org: apexsigma-solutions
