# OVS Phase 0: Environment Variable Template
# -----------------------------------------------------------------------------
# INSTRUCTIONS:
# 1. Rename this file to `.env` in the root of the project.
# 2. Replace all placeholder values (e.g., "changeme") with actual secrets/configs.
#
# NOTE: This file contains all necessary "keys" for the Phase 0 stabilization effort.
# -----------------------------------------------------------------------------

# --- General Compose & Docker Settings ---
# Standardize platform to avoid issues on ARM-based machines (e.g., Apple M1/M2).
DOCKER_DEFAULT_PLATFORM=linux/amd64
COMPOSE_PROJECT_NAME=ovs_stabilization

# --- PostgreSQL Database (For Dagster) ---
# Credentials for the PostgreSQL service itself.
POSTGRES_USER=dagster
POSTGRES_PASSWORD=changeme_dagster_password
POSTGRES_DB=dagster

# --- Neo4j Graph Database (For Memos-API) ---
# Credentials for the Neo4j service. The format 'neo4j/password' is required.
NEO4J_USER=neo4j
NEO4J_PASSWORD=changeme_neo4j_password
NEO4J_AUTH=neo4j/changeme_neo4j_password

# --- Dagster Webserver Configuration ---
# How Dagster connects to its PostgreSQL backend.
DAGSTER_POSTGRES_USER=${POSTGRES_USER}
DAGSTER_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
DAGSTER_POSTGRES_DB=${POSTGRES_DB}
DAGSTER_POSTGRES_HOST=postgres_db # The service name from docker-compose.yml
DAGSTER_POSTGRES_PORT=5432
DAGSTER_WEBSERVER_PORT=3000

# --- Memos-API Configuration ---
# How the Memos service connects to its Neo4j backend.
MEMOS_NEO4J_URI=bolt://neo4j_db:7687 # The service name from docker-compose.yml
MEMOS_NEO4J_USER=${NEO4J_USER}
MEMOS_NEO4J_PASSWORD=${NEO4J_PASSWORD}
MEMOS_API_PORT=5230

# --- Tools-API Configuration ---
TOOLS_API_PORT=8000
