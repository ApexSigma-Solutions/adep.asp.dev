name: Repository Cleanup Check

on:
  pull_request:
    branches:
      - alpha
      - main
  push:
    branches:
      - alpha
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Python Bytecode Detection
  # =============================================================================
  check-python-bytecode:
    name: Check for Python Bytecode Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for __pycache__ directories
        id: check-pycache
        run: |
          echo "Searching for __pycache__ directories..."
          if find . -type d -name "__pycache__" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Python Bytecode Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`__pycache__\` directories:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type d -name "__pycache__" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No __pycache__ directories found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for .pyc files
        id: check-pyc
        run: |
          echo "Searching for .pyc files..."
          if find . -type f -name "*.pyc" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ .pyc Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`.pyc\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name "*.pyc" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No .pyc files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for .pyo files
        id: check-pyo
        run: |
          echo "Searching for .pyo files..."
          if find . -type f -name "*.pyo" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ .pyo Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`.pyo\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name "*.pyo" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No .pyo files found" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Dagster Temporary Directories Detection
  # =============================================================================
  check-dagster-temps:
    name: Check for Dagster Temporary Directories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for tmps_* directories
        id: check-tmps
        run: |
          echo "Searching for tmps_* directories..."
          if find . -type d -name "tmps_*" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Dagster Temporary Directories Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`tmps_*\` directories:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type d -name "tmps_*" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No tmps_* directories found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for tmp*_dagster_* directories
        id: check-dagster-tmp
        run: |
          echo "Searching for tmp*_dagster_* directories..."
          if find . -type d -name "tmp*_dagster_*" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Dagster Temporary Directories Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`tmp*_dagster_*\` directories:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type d -name "tmp*_dagster_*" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No tmp*_dagster_* directories found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for dagster_home/storage/* files
        id: check-dagster-storage
        run: |
          echo "Searching for dagster_home/storage/* files..."
          if find . -path "*/dagster_home/storage/*" -type f | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Dagster Storage Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found files in \`dagster_home/storage/\`:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -path "*/dagster_home/storage/*" -type f | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No dagster_home/storage/* files found" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Root-Level Test Scripts Detection
  # =============================================================================
  check-root-test-scripts:
    name: Check for Root-Level Test Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for root-level test_*.py files
        id: check-test-prefix
        run: |
          echo "Searching for root-level test_*.py files..."
          if find . -maxdepth 1 -type f -name "test_*.py" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Root-Level Test Scripts Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`test_*.py\` files in root:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -maxdepth 1 -type f -name "test_*.py" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Move these to \`tests/\` or \`scripts/\` directory" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No root-level test_*.py files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for root-level *_test.py files
        id: check-test-suffix
        run: |
          echo "Searching for root-level *_test.py files..."
          if find . -maxdepth 1 -type f -name "*_test.py" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Root-Level Test Scripts Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`*_test.py\` files in root:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -maxdepth 1 -type f -name "*_test.py" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Move these to \`tests/\` or \`scripts/\` directory" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No root-level *_test.py files found" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Additional Cleanup Checks
  # =============================================================================
  check-os-artifacts:
    name: Check for OS Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for .DS_Store files (macOS)
        id: check-ds-store
        run: |
          echo "Searching for .DS_Store files..."
          if find . -type f -name ".DS_Store" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ .DS_Store Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`.DS_Store\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name ".DS_Store" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No .DS_Store files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for Thumbs.db files (Windows)
        id: check-thumbs-db
        run: |
          echo "Searching for Thumbs.db files..."
          if find . -type f -name "Thumbs.db" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ Thumbs.db Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`Thumbs.db\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name "Thumbs.db" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No Thumbs.db files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for large log files
        id: check-log-files
        run: |
          echo "Searching for .log files (excluding allowed locations)..."
          if find . -type f -name "*.log" ! -path "*/logs/.gitkeep" ! -path "*/.gitignore" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ⚠️ Log Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`.log\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name "*.log" ! -path "*/logs/.gitkeep" ! -path "*/.gitignore" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note:** Log files should be .gitignored" >> $GITHUB_STEP_SUMMARY
            # Don't fail, just warn
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No log files found" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Environment File Check
  # =============================================================================
  check-env-files:
    name: Check for .env Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for .env files (excluding .env.example)
        id: check-env
        run: |
          echo "Searching for .env files..."
          if find . -type f -name ".env" ! -name ".env.example" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "### ❌ .env Files Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found \`.env\` files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find . -type f -name ".env" ! -name ".env.example" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Security Risk:** .env files should NEVER be committed!" >> $GITHUB_STEP_SUMMARY
            echo "Use \`.env.example\` for templates instead." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "### ✅ No .env files found (only .env.example allowed)" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Summary Report
  # =============================================================================
  cleanup-summary:
    name: Generate Cleanup Summary
    runs-on: ubuntu-latest
    needs:
      - check-python-bytecode
      - check-dagster-temps
      - check-root-test-scripts
      - check-os-artifacts
      - check-env-files
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# 🧹 Repository Cleanup Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Bytecode | ${{ needs.check-python-bytecode.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dagster Temps | ${{ needs.check-dagster-temps.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Root Test Scripts | ${{ needs.check-root-test-scripts.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OS Artifacts | ${{ needs.check-os-artifacts.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment Files | ${{ needs.check-env-files.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Cleanup Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If any checks failed, use these commands to clean up:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Remove Python bytecode" >> $GITHUB_STEP_SUMMARY
          echo 'find . -type d -name "__pycache__" -exec rm -rf {} +' >> $GITHUB_STEP_SUMMARY
          echo 'find . -type f -name "*.pyc" -delete' >> $GITHUB_STEP_SUMMARY
          echo 'find . -type f -name "*.pyo" -delete' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Remove Dagster temporary directories" >> $GITHUB_STEP_SUMMARY
          echo 'find . -type d -name "tmps_*" -exec rm -rf {} +' >> $GITHUB_STEP_SUMMARY
          echo 'find . -type d -name "tmp*_dagster_*" -exec rm -rf {} +' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Remove OS artifacts" >> $GITHUB_STEP_SUMMARY
          echo 'find . -name ".DS_Store" -delete' >> $GITHUB_STEP_SUMMARY
          echo 'find . -name "Thumbs.db" -delete' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: |
          needs.check-python-bytecode.result != 'success' ||
          needs.check-dagster-temps.result != 'success' ||
          needs.check-root-test-scripts.result != 'success' ||
          needs.check-os-artifacts.result != 'success' ||
          needs.check-env-files.result != 'success'
        run: |
          echo "::error::One or more cleanup checks failed. See job summaries for details."
          exit 1
