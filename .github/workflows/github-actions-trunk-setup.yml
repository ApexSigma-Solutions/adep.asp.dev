name: Upload Test Results to Trunk

on:
  pull_request:
  push:
    branches: [alpha, feat/ci-security-pipelines]

jobs:
  test:
    name: Run Tests and Upload to Trunk
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          
      - name: Install Dependencies
        run: |
          poetry install --sync --no-root
          
      - name: Run Tests with JUnit Output
        run: |
          poetry run pytest --junit-xml=junit.xml -o junit_family=xunit1 --tb=short
        continue-on-error: true
        
      - name: Upload Test Results to Trunk.io
        if: "!cancelled()" # Upload even if tests fail
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: "**/*.xml"
          org-slug: apexsigma-solutions
          token: ${{ secrets.TRUNK_API_TOKEN }}
