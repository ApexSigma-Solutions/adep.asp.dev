name: ApexSigma Testing Infrastructure

on:
  pull_request:
  push:
    branches: [alpha, feat/ci-security-pipelines]
  schedule:
    # Run daily at 6 AM UTC for health monitoring
    - cron: '0 6 * * *'

jobs:
  test:
    name: Run Tests and Upload to Trunk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          
      - name: Install Dependencies
        run: |
          poetry install --sync --no-root
      
      - name: Start Required Services (Docker Compose)
        run: |
          # Create a minimal .env file for CI
          cat > .env << EOF
          POSTGRES_DB=apexsigma_test_db
          POSTGRES_USER=apexsigma_test_user
          POSTGRES_PASSWORD=Apexsigma123_
          RABBITMQ_USER=apexsigma_test_user
          RABBITMQ_PASSWORD=Apexsigma123_
          CLICKHOUSE_USER=clickhouse_test_user
          CLICKHOUSE_PASSWORD=Apexsigma123_
          CLICKHOUSE_DB=apexsigma_test_observability
          LANGFUSE_SALT=test-salt-ci-environment
          AGENT_ORCHESTRATOR_TOKEN=test_orchestrator_token
          AGENT_BACKEND_SPECIALIST_TOKEN=test_backend_token
          AGENT_CODE_REFACTORING_SPECIALIST_TOKEN=test_refactoring_token
          AGENT_DEVOPS_ENGINEER_TOKEN=test_devops_token
          AGENT_ENGINEERING_MANAGER_TOKEN=test_manager_token
          AGENT_ENTERPRISE_CTO_TOKEN=test_cto_token
          AGENT_FRONTEND_SPECIALIST_TOKEN=test_frontend_token
          AGENT_PRODUCT_OWNER_TOKEN=test_product_token
          AGENT_PROJECT_MANAGER_TOKEN=test_project_token
          EOF
          
          # Start essential services for testing
          docker compose -f docker-compose.yml up -d postgres redis neo4j qdrant
          # Wait for services to be ready
          sleep 60
          docker ps
      
      - name: Run Unit Tests with JUnit Output
        run: |
          # Run tests excluding e2e and integration tests that require full service stack
          poetry run pytest --junit-xml=junit.xml -o junit_family=xunit1 --tb=short \
            -m "not e2e and not integration" \
            --ignore=services/InGest-LLM.as/tests/ \
            --ignore=services/memos.as/app/tests/test_integration.py \
            --ignore=services/memos.as/app/tests/test_graph_api.py \
            --ignore=tests/test_core_integration_e2e.py
        continue-on-error: true
      
      - name: Cleanup Services
        if: always()
        run: |
          # Create a minimal .env file for CI
          cat > .env << EOF
          POSTGRES_DB=apexsigma_test_db
          POSTGRES_USER=apexsigma_test_user
          POSTGRES_PASSWORD=Apexsigma123_
          RABBITMQ_USER=apexsigma_test_user
          RABBITMQ_PASSWORD=Apexsigma123_
          CLICKHOUSE_USER=clickhouse_test_user
          CLICKHOUSE_PASSWORD=Apexsigma123_
          CLICKHOUSE_DB=apexsigma_test_observability
          LANGFUSE_SALT=test-salt-ci-environment
          AGENT_ORCHESTRATOR_TOKEN=test_orchestrator_token
          AGENT_BACKEND_SPECIALIST_TOKEN=test_backend_token
          AGENT_CODE_REFACTORING_SPECIALIST_TOKEN=test_refactoring_token
          AGENT_DEVOPS_ENGINEER_TOKEN=test_devops_token
          AGENT_ENGINEERING_MANAGER_TOKEN=test_manager_token
          AGENT_ENTERPRISE_CTO_TOKEN=test_cto_token
          AGENT_FRONTEND_SPECIALIST_TOKEN=test_frontend_token
          AGENT_PRODUCT_OWNER_TOKEN=test_product_token
          AGENT_PROJECT_MANAGER_TOKEN=test_project_token
          EOF
          
          docker compose -f docker-compose.yml down
        
      - name: Upload Test Results to Trunk.io
        if: always() # Upload even if tests fail
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: "**/*.xml"
          org-slug: apexsigma-solutions
          token: ${{ secrets.TRUNK_API_TOKEN }}

      - name: Generate Test Health Report
        run: |
          # Install required dependencies
          sudo apt-get update
          sudo apt-get install -y jq bc

          chmod +x ./scripts/monitor_tests.sh
          ./scripts/monitor_tests.sh analyze
          ./scripts/monitor_tests.sh dashboard

      - name: Upload Health Report
        uses: actions/upload-artifact@v4
        with:
          name: test-health-report
          path: docs/Test-Monitoring-Dashboard.md

  keploy-test:
    name: Keploy API Testing
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' # Only run on PRs for now

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker
        run: |
          docker --version
          docker network create keploy-network || true

      - name: Setup Keploy
        run: |
          # Install Keploy CLI
          curl --silent -O -L https://github.com/keploy/keploy/releases/latest/download/keploy_linux_amd64.tar.gz
          tar -xzf keploy_linux_amd64.tar.gz
          sudo mv keploy /usr/local/bin/
          keploy --version

      - name: Configure Services for Keploy
        run: |
          ./scripts/setup_keploy.sh setup

      - name: Run Keploy API Tests
        run: |
          ./scripts/setup_keploy.sh test
        continue-on-error: true

      - name: Upload Keploy Results
        uses: actions/upload-artifact@v4
        with:
          name: keploy-test-results
          path: |
            *-tests/
            keploy-test-report-*.md

  monitoring:
    name: Test Health Monitoring
    runs-on: ubuntu-latest
    needs: [test, keploy-test]
    if: always() # Run even if previous jobs fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Monitoring Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Run Health Analysis
        run: |
          chmod +x ./scripts/monitor_tests.sh
          ./scripts/monitor_tests.sh analyze
          ./scripts/monitor_tests.sh status

      - name: Generate Monitoring Dashboard
        run: |
          chmod +x ./scripts/monitor_tests.sh
          ./scripts/monitor_tests.sh dashboard

      - name: Create Health Summary
        run: |
          echo "## Test Health Summary" > health-summary.md
          echo "Generated: $(date)" >> health-summary.md
          echo "" >> health-summary.md
          echo "### Unit Tests" >> health-summary.md
          if [ -f ".test-health.json" ]; then
            cat .test-health.json | jq -r '"- Total: \(.total_tests) | Passed: \(.passed_tests) | Failed: \(.failed_tests) | Pass Rate: \(.pass_ratio)%"' >> health-summary.md
            cat .test-health.json | jq -r '"- Status: \(.health_status)"' >> health-summary.md
          else
            echo "- No health data available" >> health-summary.md
          fi
          echo "" >> health-summary.md
          echo "### API Tests (Keploy)" >> health-summary.md
          if [ -f "keploy-test-report-*.md" ]; then
            echo "- Keploy tests completed" >> health-summary.md
          else
            echo "- Keploy tests not run or failed" >> health-summary.md
          fi

      - name: Upload Monitoring Results
        uses: actions/upload-artifact@v4
        with:
          name: test-monitoring-results
          path: |
            .test-health.json
            docs/Test-Monitoring-Dashboard.md
            health-summary.md
            logs/trunk-monitor.log
