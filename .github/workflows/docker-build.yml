name: Docker Build & Test

on:
  push:
    branches: [ alpha, main ]
    paths:
      - 'services/**'
      - 'docker-compose*.yml'
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ alpha, main ]
    paths:
      - 'services/**'
      - 'docker-compose*.yml'
      - 'Dockerfile'
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile"
          recursive: true
          failure-threshold: warning

  build-services:
    name: Build Service Images
    runs-on: ubuntu-latest
    needs: hadolint
    strategy:
      matrix:
        service: [devenviro.as, InGest-LLM.as, memos.as, tools.as]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-
            ${{ runner.os }}-buildx-

      - name: Build service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: apexsigma/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  test-compose:
    name: Test Docker Compose Stack
    runs-on: ubuntu-latest
    needs: build-services
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cat > .env << EOF
          ENVIRONMENT=test
          LOG_LEVEL=DEBUG
          # Add other required environment variables
          EOF

      - name: Start services with Docker Compose
        run: |
          docker-compose -f docker-compose.ci.yml up -d
          sleep 30  # Wait for services to start

      - name: Check service health
        run: |
          docker-compose -f docker-compose.ci.yml ps
          
          # Check if all services are healthy
          for service in $(docker-compose -f docker-compose.ci.yml ps --services); do
            health=$(docker inspect --format='{{.State.Health.Status}}' $(docker-compose -f docker-compose.ci.yml ps -q $service))
            echo "$service: $health"
            if [ "$health" != "healthy" ] && [ "$health" != "" ]; then
              echo "❌ Service $service is not healthy"
              docker-compose -f docker-compose.ci.yml logs $service
              exit 1
            fi
          done

      - name: Run smoke tests
        run: |
          # Add smoke test commands here
          echo "Running smoke tests..."
          # curl -f http://localhost:8000/health || exit 1

      - name: Collect logs
        if: failure()
        run: |
          docker-compose -f docker-compose.ci.yml logs

      - name: Shutdown services
        if: always()
        run: |
          docker-compose -f docker-compose.ci.yml down -v
